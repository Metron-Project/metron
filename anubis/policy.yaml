bots:
  # Pass API requests through without a proof-of-work challenge.
  # API consumers (Metron-Tron, scripts, etc.) are not browsers and cannot
  # solve a JavaScript challenge.
  - name: api
    path_regex: ^/api/.*$
    action: ALLOW

  # Allow HTMX requests from users who have already passed the challenge.
  # Without this, Anubis would return its full challenge page in response to
  # a partial HTMX request, breaking the page update. Note: this checks for
  # the presence of the anubis-auth cookie but not its cryptographic validity,
  # which is an acceptable trade-off per the Anubis docs.
  - name: allow-htmx-iff-already-passed-challenge
    action: ALLOW
    expression:
      all:
        - '"Cookie" in headers'
        - 'headers["Cookie"].contains("anubis-auth")'
        - '"Hx-Request" in headers'
        - 'headers["Hx-Request"] == "true"'

  # Deny Meta/Facebook crawlers (meta-externalagent, facebookexternalhit, FacebookBot).
  - name: deny-meta-crawlers
    user_agent_regex: meta-externalagent|meta-webindexer|FacebookBot
    action: DENY

  # Deny known pathological bots and aggressive scrapers.
  - import: (data)/bots/_deny-pathological.yaml
  - import: (data)/bots/aggressive-brazilian-scrapers.yaml

  # Block AI/LLM bots aggressively.
  - import: (data)/meta/ai-block-aggressive.yaml

  # Allow known good search engine crawlers (Google, Bing, DuckDuckGo, etc.)
  - import: (data)/crawlers/_allow-good.yaml

  # Challenge Firefox AI previews.
  - import: (data)/clients/x-firefox-ai.yaml

  # Allow well-known routes (favicon, robots.txt, .well-known/).
  - import: (data)/common/keep-internet-working.yaml

  # Add weight to generic browser-like user agents. Combined with the
  # thresholds below this triggers the proof-of-work challenge for browsers.
  - name: generic-browser
    user_agent_regex: >-
      Mozilla|Opera
    action: WEIGH
    weight:
      adjust: 10

# Anubis fetches and caches Open Graph tags from Django and serves them to
# social media crawlers (Facebook, Twitter/X, Slack, Discord, etc.) so that
# link previews work without bypassing the challenge entirely.
openGraph:
  enabled: true
  ttl: 24h

# Weight thresholds that determine when to challenge a request.
# The generic-browser rule above adds weight=10 to browser requests,
# which lands in the moderate-suspicion band → proof-of-work challenge.
thresholds:
  - name: minimal-suspicion
    expression: weight <= 0
    action: ALLOW
  - name: mild-suspicion
    expression:
      all:
        - weight > 0
        - weight < 10
    action: CHALLENGE
    challenge:
      algorithm: metarefresh
      difficulty: 1
  - name: moderate-suspicion
    expression:
      all:
        - weight >= 10
        - weight < 20
    action: CHALLENGE
    challenge:
      algorithm: fast
      difficulty: 2
  - name: mild-proof-of-work
    expression:
      all:
        - weight >= 20
        - weight < 30
    action: CHALLENGE
    challenge:
      algorithm: fast
      difficulty: 4
  - name: extreme-suspicion
    expression: weight >= 30
    action: CHALLENGE
    challenge:
      algorithm: fast
      difficulty: 6

# BBolt persists challenge state to disk so restarts do not force all users
# to re-solve the proof-of-work. Required for production; the default memory
# backend is explicitly not recommended for production use.
store:
  backend: bbolt
  parameters:
    path: /data/anubis.bdb
