{% load static %}
<div class="timeline-item" id="{{ entry.slug }}"
     {% if not revealed %}
     hx-get="{% url 'timeline:reveal' entry.slug %}"
     hx-trigger="intersect once"
     hx-swap="outerHTML"
     {% endif %}>
  <div class="timeline-icon-date">
    <div class="timeline-icon {{ entry.icon_color }}{% if not revealed %} timeline-icon--hidden{% else %} timeline-icon--bounce-in{% endif %}">
      <span class="icon"><i class="{{ entry.icon }}"></i></span>
    </div>
    <span class="timeline-date{% if not revealed %} timeline-date--hidden{% else %} timeline-date--bounce-in{% endif %}">{{ entry.date }}</span>
  </div>
  <div class="timeline-content content box{% if not revealed %} timeline-content--hidden{% else %} timeline-content--bounce-in{% endif %}">
    <h3><a href="#{{ entry.slug }}">{{ entry.title }}</a></h3>
    {{ entry.content|safe }}
  </div>
</div>
