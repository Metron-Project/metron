upstream metron_web {
    server 127.0.0.1:8923;  # Anubis bot-protection proxy; forwards to metron-web:8000
}

# Drop requests that do not match a known server_name (e.g. IP-based scans)
server {
    listen 8080 default_server;
    listen 8443 default_server ssl;
    server_name _;
    ssl_certificate /etc/letsencrypt/live/metron.cloud-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/metron.cloud-0001/privkey.pem;
    return 444;
}

# Redirect HTTP to HTTPS
server {
    listen 8080;
    server_name metron.cloud www.metron.cloud;

    # ACME challenge for Let's Encrypt renewals
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 8443 ssl;
    http2 on;
    server_name metron.cloud www.metron.cloud;

    ssl_certificate /etc/letsencrypt/live/metron.cloud-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/metron.cloud-0001/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ecdh_curve X25519MLKEM768:X25519:prime256v1:secp384r1;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    # Security headers (HSTS is also set by Django in production)
    add_header Strict-Transport-Security "max-age=15778800; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/access.log combined;
    access_log /dev/stdout combined;

    # Increase for image uploads
    client_max_body_size 20M;

    # Blocked IPs
    deny 121.200.33.119;

    location / {
        proxy_pass http://metron_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
    }

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;
    gzip_vary on;
}
