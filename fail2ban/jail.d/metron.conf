[metron-nginx-429]
enabled     = true
backend     = auto
logpath     = /var/log/metron-nginx/access.log
filter      = metron-nginx-429
# Ban after 30 rate-limit hits within 60 seconds
maxretry    = 30
findtime    = 60
bantime     = 3600  # 1 hour
action      = firewallcmd-drop-zone

[metron-nginx-499]
enabled     = true
backend     = auto
logpath     = /var/log/metron-nginx/access.log
filter      = metron-nginx-499
# Ban after 20 client-closed connections within 60 seconds
maxretry    = 20
findtime    = 60
bantime     = 3600  # 1 hour
action      = firewallcmd-drop-zone

[metron-nginx-401]
enabled     = true
backend     = auto
logpath     = /var/log/metron-nginx/access.log
filter      = metron-nginx-401
# Ban after 10 auth failures within 5 minutes
maxretry    = 10
findtime    = 300
bantime     = 86400 # 24 hours
action      = firewallcmd-drop-zone
