[Definition]
# Ban IPs by adding them to firewalld's drop zone.
# This fires in prerouting before DNAT port forwarding, so it works correctly
# when firewalld is forwarding ports 80/443 to unprivileged ports (8080/8443).
# firewallcmd-rich-rules targets the INPUT chain which is bypassed by DNAT.

actionstart =

actionstop =

actioncheck =

actionban = firewall-cmd --zone=drop --add-source=<ip>

actionunban = firewall-cmd --zone=drop --remove-source=<ip>
